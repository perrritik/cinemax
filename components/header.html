<!--
  components/header.html
  Paste this at the top of <body> on every page.
-->

<!-- HEADER -->
<header class="site-header">
  <a href="index.html" class="logo">CINE<span>MAX</span></a>
  <nav class="site-nav">
    <a href="index.html" class="active">Главная</a>
    <a href="catalog.html">Фильмы</a>
    <a href="catalog.html?type=series">Сериалы</a>
    <a href="catalog.html?type=new">Новинки</a>
    <a href="catalog.html?type=top">Топ</a>
  </nav>
  <div class="header-search">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input type="text" placeholder="Поиск…" class="catalog-search-input" />
  </div>
  <div class="header-actions">

    <!-- Кнопка входа (только когда не авторизован) -->
    <button class="btn-login-google" id="headerLoginBtn">
      <svg width="15" height="15" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg">
        <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615z" fill="#4285F4"/>
        <path d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332C2.438 15.983 5.482 18 9 18z" fill="#34A853"/>
        <path d="M3.964 10.706c-.18-.54-.282-1.117-.282-1.706s.102-1.166.282-1.706V4.962H.957C.347 6.175 0 7.55 0 9s.348 2.825.957 4.038l3.007-2.332z" fill="#FBBC05"/>
        <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0 5.482 0 2.438 2.017.957 4.962L3.964 6.294C4.672 4.167 6.656 3.58 9 3.58z" fill="#EA4335"/>
      </svg>
      Войти
    </button>

    <!-- Аватар (только когда авторизован) -->
    <div class="avatar-dropdown-wrap" id="headerAvatarWrap">
      <button class="header-avatar-btn" id="headerAvatarBtn">
        <div class="header-avatar-initials" id="headerAvatarInitials"></div>
      </button>
      <div class="avatar-dropdown" id="avatarDropdown">
        <div class="avatar-dropdown-user">
          <div class="avatar-dropdown-name" id="dropdownName">—</div>
          <div class="avatar-dropdown-email" id="dropdownEmail">—</div>
        </div>
        <a href="profile.html" class="avatar-dropdown-item">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
          Мой профиль
        </a>
        <div class="avatar-dropdown-item danger" id="dropdownLogout">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          Выйти
        </div>
      </div>
    </div>

  </div>
  <button class="burger"><span></span><span></span><span></span></button>
</header>
